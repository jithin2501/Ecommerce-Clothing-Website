version: '3.8'

services:
  backend:
    build: ./server
    container_name: clothing_backend
    restart: always
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      # Add other environment variables as needed here
    ports:
      - "5000:5000"

  frontend:
    build: ./client
    container_name: clothing_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
